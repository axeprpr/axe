name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-python:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Resolve version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              data = tomllib.load(fh)
          print(f"version={data['project']['version']}")
          PY
      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG_NAME: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          expected_tag="v${PACKAGE_VERSION}"
          if [[ "${TAG_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${TAG_NAME} does not match package version ${PACKAGE_VERSION}." >&2
            exit 1
          fi
      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-artifacts
          path: dist/*

  build-linux-packages:
    needs: build-python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package_format: deb
            package_arch: amd64
            extension: deb
          - package_format: deb
            package_arch: arm64
            extension: deb
          - package_format: rpm
            package_arch: x86_64
            extension: rpm
          - package_format: rpm
            package_arch: aarch64
            extension: rpm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
      - name: Prepare package tree
        run: |
          rm -rf dist/package-root dist/packages
          mkdir -p dist/packages
          bash scripts/prepare_package_root.sh dist/package-root
      - name: Render nFPM config
        run: |
          python scripts/write_nfpm_config.py \
            dist/nfpm.yaml \
            "${{ needs.build-python.outputs.version }}" \
            "${{ matrix.package_arch }}" \
            "${{ matrix.package_format }}"
      - name: Build package
        run: |
          "$HOME/go/bin/nfpm" package \
            --config dist/nfpm.yaml \
            --packager "${{ matrix.package_format }}" \
            --target "dist/packages/axe-cli_${{ needs.build-python.outputs.version }}_${{ matrix.package_arch }}.${{ matrix.extension }}"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.package_format }}-${{ matrix.package_arch }}
          path: dist/packages/*

  build-offline-bundle:
    needs: build-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build offline bundle
        run: |
          mkdir -p dist/offline
          bundle_dir="dist/offline/axe-cli-${{ needs.build-python.outputs.version }}-linux-any"
          bash scripts/prepare_offline_bundle.sh "${bundle_dir}"
          tar -C dist/offline -czf "dist/offline/axe-cli_${{ needs.build-python.outputs.version }}_linux_any_offline.tar.gz" "$(basename "${bundle_dir}")"
      - uses: actions/upload-artifact@v4
        with:
          name: offline-bundle
          path: dist/offline/*.tar.gz

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-python
      - build-linux-packages
      - build-offline-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
      - name: Generate release notes body
        run: |
          {
            echo "## Release"
            echo
            echo "Version: ${{ needs.build-python.outputs.version }}"
            echo
            echo "## Artifacts"
            echo
            echo "- Python sdist"
            echo "- Python wheel"
            echo "- Debian packages: amd64, arm64"
            echo "- RPM packages: x86_64, aarch64"
            echo "- Offline bundle tarball with bundled Python dependencies"
          } > RELEASE_NOTES.md
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: RELEASE_NOTES.md
